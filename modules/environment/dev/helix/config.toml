theme = "catppuccin_mocha"

[editor]
bufferline = "multiple"
color-modes = true
continue-comments = false
end-of-line-diagnostics = "hint"
line-number = "absolute"

[editor.cursor-shape]
insert = "bar"

[editor.file-picker]
hidden = false

[editor.indent-guides]
character = "▏"
render = true
skip-levels = 1

[editor.inline-diagnostics]
cursor-line = "warning"

[editor.soft-wrap]
enable = true

[editor.statusline]
center = ["spinner", "file-name", "file-modification-indicator"]
left = ["mode", "read-only-indicator", "diagnostics"]
right = ["file-type", "position"]

[editor.whitespace.render]
nbsp = "none"
newline = "none"
nnbsp = "none"
space = "none"
tab = "all"

[keys.normal]
C-g = [":write-all", ":new", ":insert-output lazygit", ":set mouse false", ":set mouse true", ":buffer-close!", ":redraw", ":reload-all"]
C-s = [":w"]
esc = ["collapse_selection", "keep_primary_selection"]
